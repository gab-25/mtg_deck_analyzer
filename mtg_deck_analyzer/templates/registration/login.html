{% load static tailwind_tags %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign in &bull; MTG Deck Analyzer</title>
    {% tailwind_css %}
</head>
<body class="min-h-screen bg-slate-900 text-slate-100">
    <main class="flex min-h-screen items-center justify-center px-4">
        <div class="panel w-full max-w-sm">
            <h1 class="text-center text-2xl font-semibold">🧙 MTG Deck Analyzer</h1>
            <p class="mt-1 text-center text-slate-400">Sign in to continue.</p>

            {% if form.errors %}
            <div role="alert" class="alert alert-error mt-3">
                Invalid username or password.
            </div>
            {% endif %}

            <form method="post" action="{% url 'login' %}" class="mt-4 flex flex-col gap-4">
                {% csrf_token %}
                <label class="form-control">
                    <span class="form-label">Username</span>
                    <input
                        type="text"
                        name="{{ form.username.html_name }}"
                        id="{{ form.username.id_for_label }}"
                        class="form-input w-full"
                        autocomplete="username"
                        autofocus
                        required
                    />
                </label>

                <label class="form-control">
                    <span class="form-label">Password</span>
                    <input
                        type="password"
                        name="{{ form.password.html_name }}"
                        id="{{ form.password.id_for_label }}"
                        class="form-input w-full"
                        autocomplete="current-password"
                        required
                    />
                </label>

                <input type="hidden" name="next" value="{{ next }}" />

                <button type="submit" class="btn-primary">Sign in</button>
            </form>
        </div>
    </main>
</body>
</html>
