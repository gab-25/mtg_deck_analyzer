{% comment %}
Reusable confirmation modal (pure CSS, no inline JS). Replaces the browser's
native `confirm()` for actions that need the user to agree before they run.

A visually-hidden checkbox drives it: the trigger <label> checks it to open the
overlay (shown via `peer-checked:flex`), the backdrop and Cancel labels uncheck
it to close, and Confirm is the real submit button that POSTs to `action`.

The whole thing is wrapped in a single root element on purpose: `peer-checked`
compiles to the general-sibling selector `.peer:checked ~ *`, so without a wrapper
two modals sharing a parent would open each other. The wrapper scopes `~` to just
this modal.

Params:
  id            unique id for the checkbox/labels (must be unique per page)
  action        URL the confirm button POSTs to
  message       confirmation prompt shown in the modal
  trigger_label text for the button that opens the modal (optional, icon-only if omitted)
  trigger_icon  Material Symbols name for the trigger + modal icon (optional)
  trigger_class CSS classes for the trigger button (default: btn btn-line btn-sm)
  confirm_label text for the confirm button (default: Confirm)
  confirm_class CSS classes for the confirm button (default: btn btn-grad)
  danger        truthy to render the modal icon in the danger (red) accent
{% endcomment %}
<div class="inline-flex">
    <input type="checkbox" id="{{ id }}" class="peer sr-only" />
    <label for="{{ id }}" class="{{ trigger_class|default:'btn btn-line btn-sm' }}" style="cursor:pointer"
        {% if trigger_title %}title="{{ trigger_title }}" aria-label="{{ trigger_title }}"{% endif %}>
        {% if trigger_icon %}<span class="ms" style="font-size:18px">{{ trigger_icon }}</span>{% endif %}
        {% if trigger_label %}{{ trigger_label }}{% endif %}
    </label>
    <div class="fixed inset-0 z-50 hidden items-center justify-center p-4 peer-checked:flex"
        style="background:rgba(6,7,11,.66);backdrop-filter:blur(5px)">
        <label for="{{ id }}" class="absolute inset-0" style="cursor:pointer" aria-hidden="true"></label>
        <div class="modal-card relative" style="animation:fadeup .22s ease both">
            <div style="width:46px;height:46px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin-bottom:16px;
                {% if danger %}background:rgba(208,90,62,.12);border:1px solid rgba(208,90,62,.3){% else %}background:rgba(124,92,255,.12);border:1px solid var(--line){% endif %}">
                <span class="ms" style="font-size:24px;{% if danger %}color:var(--danger){% else %}color:var(--violet2){% endif %}">{{ trigger_icon|default:'help' }}</span>
            </div>
            <p style="font-size:14px;font-weight:300;color:var(--txt2);line-height:1.55;margin:0 0 22px">{{ message }}</p>
            <div style="display:flex;gap:10px">
                <label for="{{ id }}" class="btn btn-line" style="flex:1;cursor:pointer">Cancel</label>
                <form method="post" action="{{ action }}" style="flex:1;margin:0">
                    {% csrf_token %}
                    <button type="submit" class="{{ confirm_class|default:'btn btn-grad' }}" style="width:100%">
                        {{ confirm_label|default:'Confirm' }}
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>
