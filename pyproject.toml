[project]
name = "mtg-deck-analyzer"
version = "0.1.0"
description = "Add your description here"
readme = "README.md"
requires-python = ">=3.14"
dependencies = [
    "google-genai>=2.10.0",
    "reportlab>=5.0.0",
    "requests>=2.34.2",
]

[project.scripts]
mtg-deck-analyzer = "mtg_deck_analyzer.cli:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["mtg_deck_analyzer"]
