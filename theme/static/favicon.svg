<?xml version="1.0" encoding="UTF-8"?>
<!-- Favicon: the "vault eye/lens" brand mark on a dark rounded tile so it stays
     legible in browser tabs. Kept in sync with partials/brand_mark.html. -->
<svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 40 40" fill="none">
  <defs>
    <linearGradient id="favBrand" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#a78bff" />
      <stop offset="1" stop-color="#3dd0b5" />
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="40" height="40" rx="9" fill="#0a0b10" />
  <path d="M20 6 C30 6 37 20 37 20 C37 20 30 34 20 34 C10 34 3 20 3 20 C3 20 10 6 20 6 Z"
        stroke="url(#favBrand)" stroke-width="2.4" fill="rgba(124,92,255,.10)" />
  <circle cx="20" cy="20" r="6.4" fill="url(#favBrand)" />
  <circle cx="20" cy="20" r="2.4" fill="#0a0b10" />
</svg>
